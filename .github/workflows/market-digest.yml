name: Market Telegram Channel Digest

on:
  workflow_dispatch:
  schedule:
    # 台北時間 08:30 = UTC 00:30，週一到週五
    - cron: "30 0 * * 1-5"

    # 台北時間 06:30 = UTC 22:30，週一到週五 UTC
    # 大約是台北時間週二到週六早上，用來看美股收盤後概況
    - cron: "30 22 * * 1-5"

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send market digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
